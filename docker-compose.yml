services:
  postgres:
    image: postgres:16
    container_name: job-scheduler-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler_dev_password
      POSTGRES_DB: job_scheduler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: